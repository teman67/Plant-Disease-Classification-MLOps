name: Keep Backend Alive

on:
  schedule:
    # Every 40 minutes — gives buffer against GitHub's scheduler delays
    # - cron: "0 * * * *"    
    - cron: "*/40 * * * *" 
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping #1
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "${{ secrets.HEROKU_APP_URL }}/api/v1/health")
          echo "Ping 1 status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi

      - name: Wait 8 minutes
        run: sleep 480

      - name: Ping #2
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" "${{ secrets.HEROKU_APP_URL }}/api/v1/health")
          echo "Ping 2 status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Backend is alive!"
